<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arena Cury — Tablet</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Teko:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#00060f;--bg2:#001030;--cury:#1a5fc4;--cyan:#00daff;--gold:#ffcf4d;--fire:#ff5b1f;
    --ink:#eaf4ff;--dim:#6f8bb0;--ok:#1fd18a;--no:#ff5b6e;--card:#0a1f44;
    --star:"Orbitron",sans-serif;--body:"Rajdhani",sans-serif;--num:"Teko",sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:radial-gradient(ellipse 90% 60% at 50% -10%,#0a3a8a44 0%,transparent 60%),var(--bg);color:var(--ink);font-family:var(--body);min-height:100vh}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;background-image:radial-gradient(1px 1px at 30px 40px,#fff,transparent),radial-gradient(1px 1px at 160px 90px,#9cf,transparent),radial-gradient(2px 2px at 300px 50px,#bdf,transparent);background-size:360px 240px}
  .wrap{position:relative;z-index:2;max-width:820px;margin:0 auto;padding:clamp(16px,3vw,28px) clamp(14px,3vw,24px) 90px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo .mk{font-family:var(--star);font-weight:900;font-size:clamp(18px,3vw,26px);color:#fff;background:linear-gradient(135deg,var(--cury),#003070);padding:3px 12px;border-radius:9px;box-shadow:0 0 18px #1a5fc455}
  .logo .ar{font-family:var(--star);font-weight:900;font-size:clamp(15px,2.4vw,22px);letter-spacing:.12em;color:var(--cyan)}
  .eyebrow{font-family:var(--star);font-size:10px;letter-spacing:.35em;color:var(--cyan);font-weight:600}
  h2{font-family:var(--star);font-weight:900;font-size:clamp(20px,3.4vw,28px);margin-bottom:4px}
  .lead{color:var(--dim);font-size:14px;margin-bottom:18px}
  .step{margin-bottom:20px}.step.off{opacity:.35;pointer-events:none}
  .step .lbl{font-family:var(--star);font-size:12px;letter-spacing:.2em;color:var(--cyan);margin-bottom:10px}
  .opts{display:flex;flex-wrap:wrap;gap:10px}
  .opt{font-family:var(--body);font-weight:700;font-size:16px;color:var(--ink);background:var(--card);border:1px solid #1a5fc455;border-radius:12px;padding:13px 18px;cursor:pointer;transition:all .2s}
  .opt.sel{background:var(--cyan);color:#001030;border-color:var(--cyan);box-shadow:0 0 18px #00daff66}
  .activate{width:100%;font-family:var(--star);font-weight:900;font-size:18px;letter-spacing:.05em;text-transform:uppercase;color:#001030;background:linear-gradient(135deg,var(--cyan),var(--cury));border:none;border-radius:14px;padding:18px;cursor:pointer;box-shadow:0 0 30px #00daff44;margin-top:8px}
  .activate:disabled{background:#1a3050;color:#5a7a90;box-shadow:none;cursor:not-allowed}
  .teamhead{display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(100deg,#1a5fc433,#001030aa);border:1px solid #00daff44;border-radius:16px;padding:14px 18px;margin-bottom:14px}
  .teamhead .t{font-family:var(--star);font-weight:900;font-size:clamp(17px,3vw,24px)}
  .teamhead .s{color:var(--dim);font-size:13px;margin-top:2px}
  .teamhead .online{display:flex;align-items:center;gap:7px;font-family:var(--star);font-size:11px;letter-spacing:.1em;color:var(--ok);margin-top:6px}
  .teamhead .online .d{width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 10px var(--ok);animation:pulse 1.4s infinite}
  @keyframes pulse{50%{opacity:.4}}
  .btn-sm{font-family:var(--star);font-size:11px;letter-spacing:.05em;color:var(--dim);background:transparent;border:1px solid #1a5fc455;border-radius:9px;padding:8px 11px;cursor:pointer}
  .tabs{display:flex;gap:8px;margin-bottom:18px}
  .tab{flex:1;font-family:var(--star);font-weight:700;font-size:13px;letter-spacing:.04em;color:var(--dim);background:var(--card);border:1px solid #1a5fc444;border-radius:12px;padding:13px 8px;cursor:pointer;transition:all .2s;position:relative}
  .tab.on{color:#001030;background:var(--cyan);border-color:var(--cyan)}
  .tab .badge{position:absolute;top:-6px;right:-6px;background:var(--no);color:#fff;font-family:var(--body);font-size:11px;font-weight:700;border-radius:99px;min-width:20px;height:20px;display:flex;align-items:center;justify-content:center;padding:0 5px}
  .tab.locked{opacity:.5}
  .pane{display:none}.pane.on{display:block;animation:fade .25s both}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .quick{display:flex;gap:10px;margin-bottom:14px}
  .quick input{flex:1;background:#001030;border:1px solid #1a5fc455;border-radius:11px;padding:13px 15px;color:var(--ink);font-family:var(--body);font-size:16px}
  .quick button{font-family:var(--star);font-weight:700;font-size:14px;color:#001030;background:var(--ok);border:none;border-radius:11px;padding:0 18px;cursor:pointer}
  .search{width:100%;background:#001030;border:1px solid #1a5fc455;border-radius:12px;padding:14px 16px;color:var(--ink);font-family:var(--body);font-size:16px;margin-bottom:14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .bro{background:var(--card);border:1px solid #1a5fc455;border-radius:16px;padding:15px;cursor:pointer;text-align:left;color:var(--ink);transition:transform .15s}
  .bro:active{transform:scale(.97)}
  .bro .nm{font-weight:700;font-size:18px;margin-bottom:8px}
  .bro .sc{font-family:var(--star);font-weight:900;font-size:22px;color:var(--cyan)}
  .bro .dt{font-size:11px;color:var(--dim);margin-top:2px}
  .challenge-btn{width:100%;font-family:var(--star);font-weight:900;font-size:clamp(22px,4vw,30px);letter-spacing:.06em;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,var(--fire),#e01030);border:none;border-radius:16px;padding:24px;cursor:pointer;box-shadow:0 0 30px #ff5b1f44;position:relative;overflow:hidden;transition:transform .15s}
  .challenge-btn:active{transform:scale(.98)}
  .challenge-btn span{display:block;font-family:var(--body);font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:none;opacity:.85;margin-top:6px}
  .challenge-btn::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 38%,#fff3 50%,transparent 62%);background-size:280% 100%;animation:csweep 3.5s linear infinite}
  @keyframes csweep{to{background-position:-280% 0}}
  .challenge-btn.locked{background:linear-gradient(135deg,#2a1518,#1a0e12);color:#ff8a6e;box-shadow:none;cursor:not-allowed}
  .challenge-btn.locked::after{display:none}.challenge-btn.locked span{color:#a06a5a;opacity:1}
  .arena-empty{text-align:center;color:var(--dim);padding:50px 20px;font-size:16px}
  .sectitle{font-family:var(--star);font-size:12px;letter-spacing:.15em;color:var(--cyan);margin:18px 0 10px}
  .sectitle.warn{color:var(--no)}
  .pcard{display:flex;gap:14px;align-items:center;background:var(--card);border:1px solid #1a5fc455;border-radius:14px;padding:12px 14px;margin-bottom:10px;flex-wrap:wrap}
  .pcard .foto{width:70px;height:70px;border-radius:10px;object-fit:cover;cursor:zoom-in;flex-shrink:0;border:1px solid #1a5fc455}
  .pcard .info{flex:1;min-width:140px}
  .pcard .nm{font-family:var(--star);font-weight:700;font-size:15px}
  .pcard .meta{color:var(--dim);font-size:12px;margin-top:3px}
  .pcard .ty{font-size:12px;font-weight:700;margin-top:2px}.pcard .ty.visita{color:var(--cyan)}.pcard .ty.doc{color:var(--gold)}
  .pcard button{font-family:var(--star);font-weight:700;font-size:12px;border:none;border-radius:10px;padding:11px 14px;cursor:pointer}
  .contest{background:transparent;border:1px solid var(--no)!important;color:var(--no)}
  .contested-tag{font-size:11px;color:var(--gold);font-weight:700}
  .anular{background:var(--ok);color:#012}.remover{background:var(--no);color:#fff}
  .cmodal{position:fixed;inset:0;z-index:30;display:none;background:rgba(0,4,12,.92);overflow-y:auto;padding:20px}
  .cmodal.on{display:block}
  .csheet{max-width:620px;margin:20px auto;background:#08152e;border:1px solid #1a5fc466;border-radius:22px;padding:24px;animation:up .3s cubic-bezier(.2,1.3,.4,1) both}
  @keyframes up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  .cback{font-family:var(--star);font-size:11px;letter-spacing:.05em;color:var(--dim);background:transparent;border:1px solid #1a5fc455;border-radius:9px;padding:8px 12px;cursor:pointer;margin-bottom:16px}
  .csheet h3{font-family:var(--star);font-weight:900;font-size:22px;margin-bottom:4px}
  .csheet .cl{color:var(--dim);font-size:14px;margin-bottom:18px}
  .levels{display:flex;gap:12px}
  .lvl{flex:1;border:1px solid #1a5fc455;border-radius:16px;padding:22px 16px;cursor:pointer;text-align:center;background:#0a1f44}
  .lvl .ic{font-size:34px}.lvl .nm{font-family:var(--star);font-weight:700;font-size:16px;margin-top:8px}.lvl .ds{color:var(--dim);font-size:12px;margin-top:4px}
  .clist{display:flex;flex-direction:column;gap:10px}
  .crow{display:flex;align-items:center;gap:14px;background:#0a1f44;border:1px solid #1a5fc455;border-radius:14px;padding:14px 16px;cursor:pointer}
  .crow .av{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,var(--cury),#003070);display:flex;align-items:center;justify-content:center;font-family:var(--star);font-weight:900;font-size:19px}
  .crow .info{flex:1}.crow .nm{font-family:var(--star);font-weight:700;font-size:17px}.crow .s{color:var(--dim);font-size:12px}
  .crow .on{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ok)}.crow .on .d{width:8px;height:8px;border-radius:50%;background:var(--ok)}
  .ruletabs{display:flex;gap:12px;margin-bottom:16px}
  .rt{flex:1;border:1px solid #1a5fc455;border-radius:14px;padding:16px;text-align:center;cursor:pointer;font-family:var(--star);font-weight:700;font-size:15px;color:var(--ink);background:#0a1f44}
  .rt.sel{background:var(--cyan);color:#001030;border-color:var(--cyan)}.rt small{display:block;font-family:var(--body);font-weight:600;font-size:12px;opacity:.8;margin-top:3px}
  .vals{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  .val{font-family:var(--num);font-weight:700;font-size:24px;color:var(--ink);background:#0a1f44;border:1px solid #1a5fc455;border-radius:12px;padding:12px 22px;cursor:pointer;min-width:70px;text-align:center}
  .val.sel{background:var(--gold);color:#001030;border-color:var(--gold)}.val small{display:block;font-family:var(--body);font-weight:600;font-size:11px;opacity:.7}
  .fire{width:100%;font-family:var(--star);font-weight:900;font-size:19px;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,var(--fire),#e01030);border:none;border-radius:14px;padding:18px;cursor:pointer;box-shadow:0 0 26px #ff5b1f44}
  .fire:disabled{background:#3a2030;color:#7a5a60;box-shadow:none;cursor:not-allowed}
  .waiting{text-align:center;padding:30px 10px}
  .waiting .vs{font-family:var(--star);font-weight:900;font-size:clamp(20px,4vw,30px);margin:12px 0}.waiting .vs .o1{color:var(--cyan)}.waiting .vs .o2{color:var(--fire)}
  .spinner{width:64px;height:64px;border:5px solid #1a3050;border-top-color:var(--fire);border-radius:50%;margin:18px auto;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .countdown{font-family:var(--num);font-weight:700;font-size:56px;color:var(--fire)}.waiting .st{color:var(--dim);margin-top:6px}
  .modal{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:rgba(0,4,12,.85);padding:16px}
  .modal.on{display:flex}
  .sheet{background:#08152e;border:1px solid #1a5fc466;border-radius:22px;padding:24px;width:100%;max-width:440px;animation:up .3s cubic-bezier(.2,1.3,.4,1) both}
  .sheet .who{font-family:var(--star);font-weight:900;font-size:24px;margin-bottom:4px}
  .sheet .lab{font-size:12px;letter-spacing:.2em;color:var(--cyan);margin-bottom:16px}
  .types{display:flex;gap:12px;margin-bottom:18px}
  .ty2{flex:1;border:1px solid;border-radius:14px;padding:16px;cursor:pointer;text-align:center;font-family:var(--star);font-weight:700;font-size:15px}
  .ty2.visita{border-color:#00daff66;color:var(--cyan)}.ty2.visita.sel{background:var(--cyan);color:#001030}
  .ty2.doc{border-color:#ffcf4d66;color:var(--gold)}.ty2.doc.sel{background:var(--gold);color:#001030}
  .ty2 small{display:block;font-family:var(--body);font-weight:600;font-size:12px;opacity:.8;margin-top:3px}
  .photo{width:100%;border:1px dashed #00daff66;border-radius:14px;padding:22px;text-align:center;color:var(--cyan);font-size:16px;cursor:pointer;background:transparent;margin-bottom:8px}
  .photo img{width:100%;border-radius:10px;max-height:200px;object-fit:cover}
  .reqphoto{color:var(--gold);font-size:12px;text-align:center;margin-bottom:16px}
  .acts{display:flex;gap:10px}
  .acts button{flex:1;font-family:var(--star);font-weight:700;font-size:14px;border:none;border-radius:12px;padding:15px;cursor:pointer}
  .cancel{background:transparent;border:1px solid #1a5fc455!important;color:var(--dim)}
  .send{background:linear-gradient(135deg,var(--cyan),var(--cury));color:#001030}.send:disabled{background:#1a3050;color:#5a7a90;cursor:not-allowed}
  .zoom{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,2,8,.93);padding:20px;cursor:zoom-out}
  .zoom.on{display:flex}.zoom img{max-width:100%;max-height:100%;border-radius:12px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:60;background:#08152e;border:1px solid var(--ok);border-radius:12px;padding:14px 22px;font-weight:700;color:var(--ok);opacity:0;transition:all .3s;pointer-events:none;text-align:center;max-width:90vw}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(-6px)}.toast.bad{border-color:var(--no);color:var(--no)}
  /* mini-telão da batalha */
  .battlebar{background:linear-gradient(135deg,#2a0e08,#1a0a14);border:1px solid var(--fire);border-radius:16px;padding:14px 16px;margin-bottom:16px;box-shadow:0 0 26px #ff5b1f33;position:relative;overflow:hidden}
  .battlebar::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 40%,#ff5b1f22 50%,transparent 60%);background-size:280% 100%;animation:csweep 3s linear infinite;pointer-events:none}
  .bb-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;position:relative;z-index:2}
  .bb-tag{font-family:var(--star);font-weight:900;font-size:12px;letter-spacing:.1em;color:var(--fire)}
  .bb-rule{font-family:var(--star);font-size:10px;letter-spacing:.1em;color:var(--gold)}
  .bb-grid{display:flex;align-items:center;justify-content:center;gap:6px;position:relative;z-index:2;flex-wrap:wrap}
  .bb-team{flex:1;min-width:80px;text-align:center;background:#0a1f44aa;border:1px solid #1a5fc455;border-radius:12px;padding:10px 8px;position:relative}
  .bb-team.mine{border-color:var(--cyan);background:#06283faa}
  .bb-team.lead{border-color:var(--gold);box-shadow:0 0 16px #ffcf4d44}
  .bb-crown{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:18px}
  .bb-score{font-family:var(--num);font-weight:700;font-size:42px;line-height:1;color:#fff}
  .bb-team.mine .bb-score{color:var(--cyan)}
  .bb-team.lead .bb-score{color:var(--gold)}
  .bb-name{font-family:var(--star);font-weight:700;font-size:11px;letter-spacing:.04em;color:var(--dim);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bb-team.mine .bb-name{color:var(--cyan)}
  .bb-vs{font-family:var(--star);font-weight:900;font-size:18px;color:var(--fire);flex:0 0 auto}
</style>
</head>
<body>
<div class="stars"></div>
<div class="wrap">
  <div class="top"><div class="logo"><span class="mk">CURY</span><span class="ar">ARENA</span></div><div class="eyebrow">TABLET DA EQUIPE</div></div>
  <div id="view"></div>
</div>
<div class="modal" id="modal"></div>
<div class="cmodal" id="cmodal"></div>
<div class="zoom" id="zoom"><img id="zoomImg" src=""/></div>
<div class="toast" id="toast"></div>

<script src="arena-api.js"></script>
<script>
let API_ON=false; // vira true se o banco responder
let BASE=[
  {dir:"Diretoria Alfa",sup:"Sup. Centauro",ger:"Ger. Órion",corretores:["Lucas","Marina","Pedro","Bia"]},
  {dir:"Diretoria Alfa",sup:"Sup. Centauro",ger:"Ger. Pulsar",corretores:["Rafa","Duda","Tiago"]},
  {dir:"Diretoria Alfa",sup:"Sup. Andrômeda",ger:"Ger. Vega",corretores:["Carol","João","Lia","Nando"]},
];
let scores={}, sel={dir:null,sup:null,ger:null}, active=false, tab="equipe";
let inBattle=false, faltas={};
let pontosAdversarios=[], contestacoesRecebidas=[];
function ph(t,c){return "data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><rect width='200' height='200' fill='"+c+"'/><text x='100' y='100' font-family='sans-serif' font-size='16' fill='#fff' text-anchor='middle'>"+t+"</text></svg>")));}
const uniq=a=>[...new Set(a)];
const dirs=()=>uniq(BASE.map(b=>b.dir));
const sups=()=>uniq(BASE.filter(b=>b.dir===sel.dir).map(b=>b.sup));
const gers=()=>uniq(BASE.filter(b=>b.dir===sel.dir&&b.sup===sel.sup).map(b=>b.ger));
const team=()=>BASE.find(b=>b.dir===sel.dir&&b.sup===sel.sup&&b.ger===sel.ger);
const keyOf=n=>sel.ger+"|"+n;
const agora=()=>new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

function render(){
  const v=document.getElementById("view");
  if(!active){v.innerHTML=logonHTML();bindLogon();return;}
  v.innerHTML=shellHTML();bindShell();
  const p=document.getElementById("pane");
  if(tab==="equipe"){p.innerHTML=equipeHTML();bindEquipe();}
  if(tab==="arena"){p.innerHTML=arenaHTML();bindArena();}
}
function logonHTML(){
  const o=(arr,cur,k)=>arr.map(x=>`<button class="opt${cur===x?' sel':''}" data-k="${k}" data-v="${x}">${x}</button>`).join("");
  return `<div class="eyebrow">ATIVAR EQUIPE NA ESTAÇÃO</div><h2>Faça o logon da sua equipe</h2>
  <p class="lead">Selecione sua posição. Isso ativa sua equipe na arena.</p>
  <div class="step"><div class="lbl">1 · DIRETORIA</div><div class="opts">${o(dirs(),sel.dir,"dir")}</div></div>
  <div class="step ${sel.dir?'':'off'}"><div class="lbl">2 · SUPERINTENDENTE</div><div class="opts">${sel.dir?o(sups(),sel.sup,"sup"):''}</div></div>
  <div class="step ${sel.sup?'':'off'}"><div class="lbl">3 · VOCÊ (GERENTE)</div><div class="opts">${sel.sup?o(gers(),sel.ger,"ger"):''}</div></div>
  <button class="activate" id="actBtn" ${sel.ger?'':'disabled'}>⚡ Ativar equipe na arena</button>`;
}
function bindLogon(){
  document.querySelectorAll(".opt[data-k]").forEach(b=>b.onclick=()=>{const k=b.dataset.k,val=b.dataset.v;
    if(k==="dir"){sel.dir=val;sel.sup=null;sel.ger=null;}if(k==="sup"){sel.sup=val;sel.ger=null;}if(k==="ger")sel.ger=val;render();});
  const a=document.getElementById("actBtn");if(a)a.onclick=async()=>{
    active=true;
    const t=team();
    if(API_ON&&t.id){ try{ await ArenaAPI.setOnline(t.id,true); }catch(e){} }
    render();toast(t.ger+" ativada na arena! 🚀");
  };
}
function shellHTML(){
  const t=team();const nC=contestacoesRecebidas.length;
  return `<div class="teamhead"><div><div class="t">${t.ger}</div><div class="s">${t.dir} · ${t.sup}</div>
    <div class="online"><span class="d"></span> ONLINE NA ARENA</div></div><button class="btn-sm" id="logout">trocar equipe</button></div>
  <div class="tabs">
    <button class="tab ${tab==='equipe'?'on':''}" data-tab="equipe">👥 Equipe</button>
    <button class="tab ${tab==='arena'?'on':''} ${inBattle?'':'locked'}" data-tab="arena">🛡 Arena${nC?`<span class="badge">${nC}</span>`:''}</button>
  </div><div class="pane on" id="pane"></div>`;
}
function bindShell(){
  document.getElementById("logout").onclick=()=>{active=false;sel={dir:null,sup:null,ger:null};tab="equipe";render();};
  document.querySelectorAll(".tab[data-tab]").forEach(b=>b.onclick=()=>{
    if(b.dataset.tab==="arena"&&!inBattle){toast("A aba Arena abre quando você está em um duelo");return;}
    tab=b.dataset.tab;render();});
}
let filter="";
function placarBatalhaHTML(){
  if(!inBattle||!dueloPlacar.length) return "";
  const myId=team().id;
  // ordena por pontos desc; líder em destaque
  const arr=[...dueloPlacar].sort((a,b)=>(b.pontos||0)-(a.pontos||0));
  const lider=arr.length?arr[0]:null;
  const regraTxt = dueloRegra==='meta'?`META ${dueloRegraValor} visitas` : (dueloRegra==='tempo'?`TEMPO ${dueloRegraValor} min`:'');
  return `<div class="battlebar">
    <div class="bb-head"><span class="bb-tag">🥊 BATALHA AO VIVO</span><span class="bb-rule">${regraTxt}</span></div>
    <div class="bb-grid">${arr.map(p=>{
      const mine=p.equipe_id==myId;const isLead=lider&&p.equipe_id===lider.equipe_id&&(p.pontos||0)>0;
      return `<div class="bb-team ${mine?'mine':''} ${isLead?'lead':''}">
        ${isLead?'<div class="bb-crown">👑</div>':''}
        <div class="bb-score">${p.pontos||0}</div>
        <div class="bb-name">${mine?'VOCÊ':p.gerencia}</div></div>`;
    }).join('<div class="bb-vs">×</div>')}</div></div>`;
}
function equipeHTML(){
  const t=team();const list=t.corretores.filter(n=>n.toLowerCase().includes(filter.toLowerCase()));
  const challengeBtn = inBattle
    ? `<button class="challenge-btn locked" style="margin-bottom:16px">🥊 VOCÊ JÁ ESTÁ NA ARENA — FOCO NA LUTA! <span>termine a batalha atual para desafiar de novo</span></button>`
    : `<button class="challenge-btn" id="challengeBtn" style="margin-bottom:16px">⚔ DESAFIAR <span>chame alguém para a arena</span></button>`;
  return `${placarBatalhaHTML()}${challengeBtn}
  <div class="quick"><input id="qn" placeholder="Cadastro rápido — apelido"/><button id="qadd">+ Add</button></div>
  <input class="search" id="search" placeholder="🔍 Buscar corretor…" value="${filter}"/>
  <div class="grid">${list.map(n=>{const sc=scores[keyOf(n)]||{v:0,d:0};
    return `<button class="bro" data-n="${n}"><div class="nm">${n}</div><div class="sc">${sc.v*1+sc.d*3}</div><div class="dt">${sc.v} vis · ${sc.d} doc</div></button>`;}).join("")}</div>`;
}
function bindEquipe(){
  const cb=document.getElementById("challengeBtn");if(cb)cb.onclick=openChallenge;
  document.getElementById("qadd").onclick=()=>{const i=document.getElementById("qn");const nm=i.value.trim();if(!nm)return;team().corretores.push(nm);toast(nm+" cadastrado!");render();};
  document.getElementById("search").oninput=e=>{filter=e.target.value;render();const s=document.getElementById("search");if(s){s.focus();s.value=filter;s.setSelectionRange(filter.length,filter.length);}};
  document.querySelectorAll(".bro").forEach(b=>b.onclick=()=>openMarcar(b.dataset.n));
}
let mTipo=null,mFoto=null,mNome=null;
function openMarcar(n){
  mNome=n;mTipo=null;mFoto=null;const m=document.getElementById("modal");
  m.innerHTML=`<div class="sheet"><div class="lab">MARCAR PONTO</div><div class="who">${n}</div>
    <div class="types"><div class="ty2 visita" id="tyV">🎯 Visita<small>+1</small></div><div class="ty2 doc" id="tyD">🏆 Documentação<small>+3</small></div></div>
    <input type="file" accept="image/*" capture="environment" id="file" style="display:none"/>
    <button class="photo" id="photoBtn">📷 Tirar foto do comprovante</button>
    <div class="reqphoto">⚠ Foto obrigatória — o ponto vale na hora e os adversários poderão conferir</div>
    <div class="acts"><button class="cancel" id="mCancel">Cancelar</button><button class="send" id="mSend" disabled>Registrar ponto</button></div></div>`;
  m.classList.add("on");
  document.getElementById("tyV").onclick=()=>{mTipo="visita";updM();};
  document.getElementById("tyD").onclick=()=>{mTipo="doc";updM();};
  document.getElementById("photoBtn").onclick=()=>document.getElementById("file").click();
  document.getElementById("file").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{mFoto=r.result;updM();};r.readAsDataURL(f);};
  document.getElementById("mCancel").onclick=()=>m.classList.remove("on");
  document.getElementById("mSend").onclick=registrarPonto;
}
function updM(){
  document.getElementById("tyV").classList.toggle("sel",mTipo==="visita");
  document.getElementById("tyD").classList.toggle("sel",mTipo==="doc");
  if(mFoto)document.getElementById("photoBtn").innerHTML=`<img src="${mFoto}"/>`;
  document.getElementById("mSend").disabled=!(mTipo&&mFoto);
}
async function registrarPonto(){
  const k=keyOf(mNome);const s=scores[k]||{v:0,d:0};if(mTipo==="visita")s.v++;else s.d++;scores[k]=s;
  document.getElementById("modal").classList.remove("on");
  const valor=mTipo==="doc"?3:1;
  // atualiza o placar da batalha na hora (otimista)
  if(inBattle&&dueloPlacar.length){
    const meu=dueloPlacar.find(p=>p.equipe_id==team().id);
    if(meu)meu.pontos=(parseInt(meu.pontos)||0)+valor;
  }
  // grava no banco (se conectado)
  if(API_ON){
    const t=team();
    const corr=(t.corretoresIds&&t.corretoresIds[mNome])||null;
    try{ await ArenaAPI.marcarPonto({equipe_id:t.id, corretor_id:corr, tipo:(mTipo==="doc"?"documentacao":"visita"), foto:mFoto}); }
    catch(e){ toast("Salvo localmente (sem conexão com o banco)",true); }
  }
  toast(`Ponto de ${mNome} registrado! Vale na hora ⚡`);render();
}
function arenaHTML(){
  if(!inBattle) return `<div class="arena-empty">🛡<br><br>Você não está em nenhum duelo agora.<br>Esta aba abre quando um desafio começa.</div>`;
  let h="";
  if(contestacoesRecebidas.length){
    h+=`<div class="sectitle warn">⚠ CONTESTAÇÕES CONTRA VOCÊ — converse e decida</div>`;
    h+=contestacoesRecebidas.map(c=>`<div class="pcard"><img class="foto" src="${c.foto}" data-zoom="${c.foto}"/>
      <div class="info"><div class="nm">${c.tipo==='doc'?'Documentação':'Visita'} contestada</div><div class="meta">por ${c.equipe} · ${c.hora}</div></div>
      <div style="display:flex;gap:8px"><button class="anular" data-anular="${c.id}">✓ Anular</button><button class="remover" data-remover="${c.id}">✕ Remover ponto</button></div></div>`).join("");
  }
  h+=`<div class="sectitle">PONTOS DOS ADVERSÁRIOS — confira os comprovantes</div>`;
  if(!pontosAdversarios.length) h+=`<p class="lead">Nenhum ponto dos adversários ainda.</p>`;
  else h+=pontosAdversarios.map(p=>`<div class="pcard"><img class="foto" src="${p.foto}" data-zoom="${p.foto}"/>
    <div class="info"><div class="nm">${p.equipe}</div><div class="ty ${p.tipo}">${p.tipo==='doc'?'🏆 Documentação':'🎯 Visita'}</div><div class="meta">${p.hora}</div></div>
    ${p.contestado?`<span class="contested-tag">contestado ✓</span>`:`<button class="contest" data-contest="${p.id}">⚑ Contestar</button>`}</div>`).join("");
  return h;
}
function bindArena(){
  document.querySelectorAll("[data-zoom]").forEach(i=>i.onclick=()=>{document.getElementById("zoomImg").src=i.dataset.zoom;document.getElementById("zoom").classList.add("on");});
  document.querySelectorAll("[data-contest]").forEach(b=>b.onclick=async()=>{
    const p=pontosAdversarios.find(x=>x.id==b.dataset.contest);p.contestado=true;render();
    if(API_ON){ try{ await ArenaAPI.contestar(p.id,team().id); }catch(e){} }
    toast(`Você contestou um ponto de ${p.equipe}. Eles serão avisados.`);});
  document.querySelectorAll("[data-anular]").forEach(b=>b.onclick=async()=>{
    const id=b.dataset.anular;contestacoesRecebidas=contestacoesRecebidas.filter(c=>c.id!=id);render();
    if(API_ON){ try{ await ArenaAPI.anularContestacao(id); }catch(e){} }
    toast("Contestação anulada — o ponto continua valendo.");});
  document.querySelectorAll("[data-remover]").forEach(b=>b.onclick=async()=>{
    const id=b.dataset.remover;contestacoesRecebidas=contestacoesRecebidas.filter(x=>x.id!=id);
    let desclass=false;
    if(API_ON){
      try{ const r=await ArenaAPI.removerPonto(id); if(r&&r.ok) desclass=r.desclassificado; }catch(e){}
    }else{
      const eq=team().ger;faltas[eq]=(faltas[eq]||0)+1;desclass=faltas[eq]>=2;
    }
    if(desclass){toast(`2ª FALTA! ${team().ger} DESCLASSIFICADO do duelo. Vitória do oponente.`,true);inBattle=false;tab="equipe";}
    else toast(`FALTA confirmada — −1 ponto. Na TV: "FALTA".`);
    render();});
}
let ONLINE=[{ger:"Ger. Pulsar",sup:"Sup. Centauro",corretores:["Rafa","Duda","Tiago"]},{ger:"Ger. Vega",sup:"Sup. Andrômeda",corretores:["Carol","João","Lia"]}];
// carrega equipes ONLINE do banco (exceto a minha) para listar como oponentes
async function carregarOnline(){
  if(!API_ON)return;
  try{
    const res=await ArenaAPI.listarEquipes();
    if(res&&res.ok&&Array.isArray(res.equipes)){
      const minha=team();
      ONLINE=res.equipes
        .filter(e=>e.online==1 && !(minha&&e.id===minha.id))
        .map(e=>({id:e.id,ger:e.gerencia,sup:e.superintendencia,corretores:(e.corretores||[]).map(c=>c.nome)}));
    }
  }catch(e){}
}
let cStep="level",cLevel=null,cOppGer=null,cOppCorr=null,cRuleType=null,cRuleVal=null,waitInt=null;
function openChallenge(){cStep="level";cLevel=cOppGer=cOppCorr=cRuleType=cRuleVal=null;document.getElementById("cmodal").classList.add("on");cRender();carregarOnline().then(()=>{if(cStep==="oppGer")cRender();});}
function closeChallenge(){document.getElementById("cmodal").classList.remove("on");clearInterval(waitInt);}
function cRender(){
  const m=document.getElementById("cmodal");let h="";
  if(cStep==="level")h=`<button class="cback" onclick="closeChallenge()">✕ fechar</button><h3>Tipo de desafio</h3><p class="cl">Entre equipes ou corretores?</p>
    <div class="levels"><div class="lvl" onclick="cPickLevel('ger')"><div class="ic">🛡️</div><div class="nm">GERÊNCIA</div><div class="ds">equipe x equipe</div></div>
    <div class="lvl" onclick="cPickLevel('corr')"><div class="ic">🎯</div><div class="nm">CORRETOR</div><div class="ds">corretor x corretor</div></div></div>`;
  else if(cStep==="oppGer")h=`<button class="cback" onclick="cBack('level')">← voltar</button><h3>${cLevel==='ger'?'Equipe rival':'Gerente do corretor'}</h3><p class="cl">Online agora:</p>
    <div class="clist">${ONLINE.map((o,i)=>`<div class="crow" onclick="cPickGer(${i})"><div class="av">${o.ger.split(" ").pop()[0]}</div><div class="info"><div class="nm">${o.ger}</div><div class="s">${o.sup}</div></div><div class="on"><span class="d"></span> online</div></div>`).join("")}</div>`;
  else if(cStep==="oppCorr")h=`<button class="cback" onclick="cBack('oppGer')">← voltar</button><h3>Qual corretor?</h3><p class="cl">De ${cOppGer.ger}:</p>
    <div class="clist">${cOppGer.corretores.map((c,i)=>`<div class="crow" onclick="cPickCorr(${i})"><div class="av">${c[0]}</div><div class="info"><div class="nm">${c}</div></div></div>`).join("")}</div>`;
  else if(cStep==="rule"){const opp=cLevel==='ger'?cOppGer.ger:(cOppCorr+" ("+cOppGer.ger+")");const opts=cRuleType==='meta'?[5,10,15,20]:[15,30,45,60];const u=cRuleType==='meta'?'visitas':'min';
    h=`<button class="cback" onclick="cBack('${cLevel==='ger'?'oppGer':'oppCorr'}')">← voltar</button><h3>Como vence?</h3><p class="cl">Desafiando: <b style="color:var(--cyan)">${opp}</b></p>
    <div class="ruletabs"><div class="rt ${cRuleType==='meta'?'sel':''}" onclick="cSetRule('meta')">🏁 META<small>primeiro a chegar</small></div><div class="rt ${cRuleType==='tempo'?'sel':''}" onclick="cSetRule('tempo')">⏱ TEMPO<small>quem fizer mais</small></div></div>
    ${cRuleType?`<div class="vals">${opts.map(o=>`<div class="val ${cRuleVal===o?'sel':''}" onclick="cSetVal(${o})">${o}<small>${u}</small></div>`).join("")}</div>`:''}
    <button class="fire" ${cRuleType&&cRuleVal?'':'disabled'} onclick="cFire()">⚔ Lançar desafio</button>`;}
  else if(cStep==="waiting"){const opp=cLevel==='ger'?cOppGer.ger:(cOppCorr+" ("+cOppGer.ger+")");
    h=`<div class="waiting"><div class="eyebrow">DESAFIO LANÇADO</div><div class="vs"><span class="o1">${team().ger}</span> ⚔ <span class="o2">${opp}</span></div>
    <div class="spinner"></div><div class="countdown" id="cwcd">10</div><div class="st">aguardando aceite…</div><button class="cback" style="margin-top:18px" onclick="closeChallenge()">cancelar</button></div>`;}
  m.innerHTML=`<div class="csheet">${h}</div>`;
}
function cBack(s){cStep=s;cRender();}
function cPickLevel(l){cLevel=l;cStep="oppGer";cRender();}
function cPickGer(i){cOppGer=ONLINE[i];cStep=cLevel==='ger'?"rule":"oppCorr";cRender();}
function cPickCorr(i){cOppCorr=cOppGer.corretores[i];cStep="rule";cRender();}
function cSetRule(t){cRuleType=t;cRuleVal=null;cRender();}
function cSetVal(v){cRuleVal=v;cRender();}
let meuDueloId=null;
function cFire(){
  cStep="waiting";cRender();
  const meta = cRuleType==='meta'? cRuleVal : cRuleVal; // valor (visitas ou minutos)
  let t=10; clearInterval(waitInt);
  // cria o desafio no banco (se conectado)
  if(API_ON && team().id && cOppGer && cOppGer.id){
    ArenaAPI.criarDuelo({
      nivel: cLevel==='ger'?'gerencia':'corretor',
      regra: cRuleType, regra_valor: cRuleVal,
      desafiante_equipe_id: team().id,
      desafiado_equipe_id: cOppGer.id
    }).then(r=>{ if(r&&r.ok) meuDueloId=r.duelo_id; }).catch(()=>{});
  }
  // conta 10s; a cada segundo verifica se o oponente aceitou
  waitInt=setInterval(async()=>{
    t--; const e=document.getElementById("cwcd"); if(e)e.textContent=t;
    // verifica aceite real
    if(API_ON && team().id){
      try{
        const r=await ArenaAPI.meuDuelo(team().id);
        if(r&&r.ok&&r.duelo&&r.duelo.status==='ativo'){
          clearInterval(waitInt);closeChallenge();
          entrarEmDueloReal(r.duelo);
          return;
        }
      }catch(err){}
    }
    if(t<=0){
      clearInterval(waitInt);closeChallenge();
      if(API_ON) toast("O oponente não respondeu a tempo (ou recusou).",true);
      else entrarEmDuelo(cLevel==='ger'?cOppGer.ger:cOppCorr); // modo local: simula aceite
    }
  },1000);
}
function entrarEmDuelo(oppName){
  inBattle=true;tab="arena";
  pontosAdversarios=[
    {id:1,equipe:oppName,tipo:"visita",foto:ph("Comprovante 1","#1a5fc4"),hora:agora(),contestado:false},
    {id:2,equipe:oppName,tipo:"doc",foto:ph("Documentacao","#0a7d5a"),hora:agora(),contestado:false}];
  contestacoesRecebidas=[];faltas={};
  toast(oppName+" ACEITOU! Duelo na TV 🥊 — veja a aba Arena");render();
}

// entra no duelo usando dados REAIS do banco
function entrarEmDueloReal(duelo){
  inBattle=true;tab="arena";meuDueloId=duelo.id;
  contestacoesRecebidas=[];faltas={};pontosAdversarios=[];
  dueloPlacar=duelo.participantes||[];dueloRegra=duelo.regra;dueloRegraValor=duelo.regra_valor;
  const oppNames=(duelo.participantes||[]).filter(p=>p.equipe_id!==team().id).map(p=>p.gerencia).join(", ");
  carregarArenaDoBanco();
  toast((oppNames||"Oponente")+" no duelo! 🥊 — placar no topo");render();
}

let dueloPlacar=[],dueloRegra=null,dueloRegraValor=null;

// busca os pontos dos adversários e as contestações recebidas do banco
async function carregarArenaDoBanco(){
  if(!API_ON||!meuDueloId||!team().id)return;
  try{
    // atualiza o placar da batalha (participantes + pontos do duelo)
    const md=await ArenaAPI.meuDuelo(team().id);
    if(md&&md.ok&&md.duelo){
      dueloPlacar=md.duelo.participantes||dueloPlacar;
      dueloRegra=md.duelo.regra;dueloRegraValor=md.duelo.regra_valor;
      if(md.duelo.status==='encerrado'){ // duelo acabou
        inBattle=false;tab="equipe";dueloPlacar=[];
        toast("Duelo encerrado!");render();return;
      }
    }
    const pr=await ArenaAPI.pontosDuelo(meuDueloId,team().id);
    if(pr&&pr.ok) pontosAdversarios=(pr.pontos||[]).map(p=>({id:p.id,equipe:p.equipe,tipo:p.tipo==='documentacao'?'doc':'visita',foto:p.foto,hora:(p.criado_em||'').slice(11,16),contestado:p.contestado==1}));
    const cr=await ArenaAPI.contestacoesRecebidas(meuDueloId,team().id);
    if(cr&&cr.ok) contestacoesRecebidas=(cr.recebidas||[]).map(c=>({id:c.id,equipe:c.contestante,tipo:c.tipo==='documentacao'?'doc':'visita',foto:c.foto,hora:(c.criado_em||'').slice(11,16)}));
    render();
  }catch(e){}
}

// polling: este tablet verifica se foi DESAFIADO e mostra alerta para aceitar/recusar
let desafioPend=null;
async function verificarDesafioRecebido(){
  if(!API_ON||!active||inBattle||!team().id)return;
  try{
    const r=await ArenaAPI.desafioParaMim(team().id);
    if(r&&r.ok&&r.desafio&&(!desafioPend||desafioPend.id!==r.desafio.id)){
      desafioPend=r.desafio;mostrarAlertaDesafio(r.desafio);
    }
  }catch(e){}
}
function mostrarAlertaDesafio(d){
  const m=document.getElementById("cmodal");
  const regra=d.regra==='meta'?`${d.regra_valor} visitas (meta)`:`${d.regra_valor} min (tempo)`;
  m.innerHTML=`<div class="csheet"><div class="eyebrow" style="color:var(--fire)">VOCÊ FOI DESAFIADO!</div>
    <h3 style="margin:8px 0">${d.desafiante} chamou você para a arena</h3>
    <p class="cl">Modo: <b style="color:var(--cyan)">${regra}</b></p>
    <div class="acts" style="margin-top:20px"><button class="cancel" onclick="responderDesafio(false)">Recusar</button>
    <button class="send" onclick="responderDesafio(true)">⚔ Aceitar e lutar</button></div></div>`;
  m.classList.add("on");
}
async function responderDesafio(aceita){
  if(!desafioPend)return;
  const did=desafioPend.id;const d=desafioPend;desafioPend=null;
  document.getElementById("cmodal").classList.remove("on");
  try{ await ArenaAPI.responderDuelo(did,aceita); }catch(e){}
  if(aceita){
    // entra no duelo recém-aceito
    try{ const r=await ArenaAPI.meuDuelo(team().id); if(r&&r.ok&&r.duelo) entrarEmDueloReal(r.duelo); }catch(e){}
  }else toast("Desafio recusado.");
}

function toast(msg,bad){const t=document.getElementById("toast");t.textContent=msg;t.className="toast on"+(bad?" bad":"");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("on"),3200);}
document.getElementById("zoom").onclick=()=>document.getElementById("zoom").classList.remove("on");

// carrega equipes do banco (se a API responder); senão segue em modo local
async function bootstrap(){
  try{
    const res=await ArenaAPI.listarEquipes();
    if(res&&res.ok&&Array.isArray(res.equipes)&&res.equipes.length){
      API_ON=true;
      BASE=res.equipes.map(e=>{
        const ids={};(e.corretores||[]).forEach(c=>ids[c.nome]=c.id);
        return {id:e.id,dir:e.diretoria,sup:e.superintendencia,ger:e.gerencia,
                corretores:(e.corretores||[]).map(c=>c.nome),corretoresIds:ids};
      });
    }
  }catch(e){ /* sem banco: modo local com dados de exemplo */ }
  render();
  // polling: verifica desafios recebidos e atualiza a arena durante o duelo
  setInterval(()=>{
    verificarDesafioRecebido();
    if(inBattle) carregarArenaDoBanco();
  },3000);
}
bootstrap();
</script>
