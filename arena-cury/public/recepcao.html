<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CORUJASTRO — Recepção</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Teko:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#00060f;--cury:#1a5fc4;--cyan:#00daff;--gold:#ffcf4d;--fire:#ff5b1f;--ink:#eaf4ff;--dim:#6f8bb0;--ok:#1fd18a;--no:#ff5b6e;--card:#0a1f44;
    --star:"Orbitron",sans-serif;--body:"Rajdhani",sans-serif;--num:"Teko",sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:radial-gradient(ellipse 90% 60% at 50% -10%,#0a3a8a44 0%,transparent 60%),var(--bg);color:var(--ink);font-family:var(--body);min-height:100vh}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;background-image:radial-gradient(1px 1px at 30px 40px,#fff,transparent),radial-gradient(1px 1px at 160px 90px,#9cf,transparent),radial-gradient(2px 2px at 300px 50px,#bdf,transparent);background-size:360px 240px}
  .wrap{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:clamp(16px,3vw,28px) clamp(14px,3vw,24px) 60px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .owl-logo{width:46px;height:46px;filter:drop-shadow(0 0 12px #00daff66);flex-shrink:0}
  .brand{font-family:var(--star);font-weight:900;font-size:clamp(20px,3.4vw,28px);letter-spacing:.06em;background:linear-gradient(135deg,#fff 20%,#00daff 60%,#1a5fc4);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .top .eyebrow{margin-left:auto;font-family:var(--star);font-size:10px;letter-spacing:.3em;color:var(--cyan)}
  .tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
  .tab{font-family:var(--star);font-weight:700;font-size:13px;letter-spacing:.03em;color:var(--dim);background:var(--card);border:1px solid #1a5fc444;border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .2s}
  .tab.on{color:#001030;background:var(--cyan);border-color:var(--cyan)}
  .pane{display:none}.pane.on{display:block;animation:fade .25s both}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  h2{font-family:var(--star);font-weight:900;font-size:22px;margin-bottom:6px}
  .lead{color:var(--dim);font-size:14px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid #1a5fc455;border-radius:16px;padding:18px;margin-bottom:16px}
  .field{margin-bottom:14px}
  .field label{display:block;font-family:var(--star);font-size:11px;letter-spacing:.12em;color:var(--cyan);margin-bottom:7px}
  .field input,.field select{width:100%;background:#001030;border:1px solid #1a5fc455;border-radius:11px;padding:12px 14px;color:var(--ink);font-family:var(--body);font-size:16px}
  .btn{font-family:var(--star);font-weight:700;font-size:14px;border:none;border-radius:11px;padding:13px 18px;cursor:pointer}
  .btn-cyan{background:linear-gradient(135deg,var(--cyan),var(--cury));color:#001030}
  .btn-gold{background:var(--gold);color:#001030}
  .btn-ok{background:var(--ok);color:#012}
  .btn-no{background:transparent;border:1px solid #ff5b6e55;color:var(--no)}
  .btn-ghost{background:transparent;border:1px solid #1a5fc455;color:var(--dim)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .mesas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .mesa{background:var(--card);border:1px solid #1a5fc455;border-radius:16px;padding:16px;min-height:120px}
  .mesa.drop{border-color:var(--cyan);box-shadow:0 0 16px #00daff44}
  .mesa-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
  .mesa-nome{font-family:var(--star);font-weight:700;font-size:16px;background:transparent;border:none;color:var(--ink);border-bottom:1px dashed transparent;cursor:text;max-width:60%}
  .mesa-nome:focus{outline:none;border-bottom-color:var(--cyan)}
  .mesa-cap{font-family:var(--num);font-weight:700;font-size:18px;color:var(--cyan)}
  .mesa-cap small{font-family:var(--body);font-size:11px;color:var(--dim)}
  .bar{height:8px;border-radius:5px;background:#001030;overflow:hidden;margin-bottom:12px}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--cury))}
  .eq{background:#06122c;border:1px solid #1a5fc444;border-radius:11px;padding:10px 12px;margin-bottom:8px;cursor:grab}
  .eq:active{cursor:grabbing}
  .eq-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .eq-nm{font-weight:700;font-size:15px}
  .eq-meta{font-size:12px;color:var(--dim);margin-top:3px}
  .eq.ocioso{border-color:#ffcf4d66}
  .ocioso-tag{color:var(--gold);font-size:11px;font-weight:700}
  .eq-acts{display:flex;gap:6px;margin-top:8px}
  .eq-acts button{font-size:11px;padding:7px 10px;border-radius:8px;font-family:var(--star);font-weight:700;border:none;cursor:pointer}
  .empty{color:var(--dim);font-size:13px;text-align:center;padding:14px}
  .pill{display:inline-block;font-family:var(--star);font-size:11px;padding:7px 13px;border-radius:99px;border:1px solid #1a5fc455;color:var(--dim);cursor:pointer}
  .pill.sel{background:var(--gold);color:#001030;border-color:var(--gold)}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px;border-bottom:1px solid #1a305055;font-size:14px}
  th{font-family:var(--star);font-size:11px;letter-spacing:.1em;color:var(--cyan)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:60;background:#08152e;border:1px solid var(--ok);border-radius:12px;padding:14px 22px;font-weight:700;color:var(--ok);opacity:0;transition:all .3s;pointer-events:none;text-align:center;max-width:90vw}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(-6px)}.toast.bad{border-color:var(--no);color:var(--no)}
  .dayrow{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .statusbadge{font-family:var(--star);font-size:11px;padding:6px 12px;border-radius:99px}
  .st-parada{background:#3a3a4a;color:#aab}.st-ativa{background:#0a7d5a;color:#fff}.st-pausada{background:#7d5a0a;color:#fff}.st-encerrada{background:#7d0a1a;color:#fff}
</style>
</head>
<body>
<div class="stars"></div>
<div class="wrap">
  <div class="top">
    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" class="owl-logo"><defs><radialGradient id="h" cx="40%" cy="35%" r="70%"><stop offset="0%" stop-color="#bfe3ff" stop-opacity=".55"/><stop offset="55%" stop-color="#1a5fc4" stop-opacity=".25"/><stop offset="100%" stop-color="#001030" stop-opacity=".1"/></radialGradient><linearGradient id="r" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00daff"/><stop offset="100%" stop-color="#1a5fc4"/></linearGradient><linearGradient id="b" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#cfe0f5"/></linearGradient></defs><circle cx="40" cy="38" r="30" fill="none" stroke="url(#r)" stroke-width="3.5"/><circle cx="40" cy="38" r="27" fill="url(#h)"/><path d="M24 36 q0 -16 16 -16 q16 0 16 16 q0 14 -16 14 q-16 0 -16 -14 Z" fill="url(#b)"/><path d="M26 26 q-3 -7 3 -10 q2 5 1 9 Z" fill="#fff"/><path d="M54 26 q3 -7 -3 -10 q-2 5 -1 9 Z" fill="#fff"/><circle cx="34" cy="35" r="6.2" fill="#fff"/><circle cx="46" cy="35" r="6.2" fill="#fff"/><circle cx="34" cy="35.5" r="3.4" fill="#0a2a5a"/><circle cx="46" cy="35.5" r="3.4" fill="#0a2a5a"/><circle cx="35.2" cy="34.3" r="1.1" fill="#fff"/><circle cx="47.2" cy="34.3" r="1.1" fill="#fff"/><path d="M40 39 l-3 3 l3 2 l3 -2 Z" fill="#ffb020"/></svg>
    <span class="brand">CORUJASTRO</span><span class="eyebrow">RECEPÇÃO</span>
  </div>
  <div class="tabs">
    <button class="tab on" data-tab="mapa">🗺 Mapa de Mesas</button>
    <button class="tab" data-tab="equipes">👥 Equipes</button>
    <button class="tab" data-tab="usuarios">🔑 Acessos</button>
    <button class="tab" data-tab="rodada">⚙ Regras & Rodada</button>
    <button class="tab" data-tab="reservas">📅 Reservas</button>
  </div>
  <div class="pane on" id="pane-mapa"></div>
  <div class="pane" id="pane-equipes"></div>
  <div class="pane" id="pane-usuarios"></div>
  <div class="pane" id="pane-rodada"></div>
  <div class="pane" id="pane-reservas"></div>
</div>
<div class="toast" id="toast"></div>

<script src="arena-api.js"></script>
<script>
let API_ON=false, hoje=new Date().toISOString().slice(0,10);
let mapaDia=hoje, mesasMapa=[], equipes=[], usuarios=[], reservas=[], cfg={pts_visita:1,pts_documentacao:3,rodada_min:120,rodada_status:'parada',rodada_modo:'tempo'};

function toast(m,bad){const t=document.getElementById("toast");t.textContent=m;t.className="toast on"+(bad?" bad":"");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("on"),3200);}
function tab(name){
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.tab===name));
  document.querySelectorAll(".pane").forEach(p=>p.classList.remove("on"));
  document.getElementById("pane-"+name).classList.add("on");
  if(name==="mapa")carregarMapa();
  if(name==="equipes")renderEquipes();
  if(name==="usuarios")renderUsuarios();
  if(name==="rodada")renderRodada();
  if(name==="reservas")renderReservas();
}
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>tab(b.dataset.tab));

// ===== MAPA DE MESAS =====
async function carregarMapa(){
  const p=document.getElementById("pane-mapa");
  p.innerHTML=`<h2>Mapa de Mesas</h2><p class="lead">Cada mesa tem 20 lugares. Veja reservado x presente, arraste equipes entre mesas e ajuste lugares ociosos.</p>
    <div class="dayrow"><label style="color:var(--dim);font-size:13px">Dia:</label><input type="date" id="mapaDia" value="${mapaDia}" style="width:auto;background:#001030;border:1px solid #1a5fc455;border-radius:10px;padding:8px 12px;color:var(--ink)"/>
    <button class="btn btn-ghost" id="reloadMapa">Atualizar</button></div>
    <p class="lead" id="mapaResumo" style="margin-top:-6px"></p>
    <div id="duelosAtivos"></div>
    <div id="mesasGrid" class="mesas-grid"><p class="lead">Carregando...</p></div>`;
  document.getElementById("mapaDia").onchange=e=>{mapaDia=e.target.value;carregarMapa();};
  document.getElementById("reloadMapa").onclick=carregarMapa;
  if(!API_ON){document.getElementById("mesasGrid").innerHTML=`<p class="empty">Conecte ao banco para ver as mesas.</p>`;return;}
  try{
    const r=await ArenaAPI.mapaMesas(mapaDia);
    mesasMapa=(r&&r.ok)?(r.mesas||[]):[];
    renderMesas();
    carregarDuelosAtivos();
  }catch(e){document.getElementById("mesasGrid").innerHTML=`<p class="empty">Erro ao carregar o mapa.</p>`;}
}
async function carregarDuelosAtivos(){
  const box=document.getElementById("duelosAtivos");if(!box)return;
  if(!API_ON){box.innerHTML="";return;}
  let duelos=[];
  try{const r=await ArenaAPI.duelosAtivos();duelos=(r&&r.duelos)?r.duelos.filter(d=>d.status==="ativo"):[];}catch(e){box.innerHTML="";return;}
  if(!duelos.length){box.innerHTML="";return;}
  box.innerHTML=`<div style="background:#1a0e1e;border:1px solid #ff5b6e44;border-radius:14px;padding:14px;margin-bottom:18px">
    <div style="font-family:var(--star);font-size:13px;letter-spacing:.1em;color:#ff8a9c;margin-bottom:10px">🥊 DUELOS EM ANDAMENTO — encerrar em caso de erro ou desistência</div>
    ${duelos.map(d=>{
      const nomes=(d.participantes||[]).map(p=>`${p.gerencia} <b style="color:var(--cyan)">${p.pontos}</b>`).join(" &nbsp;×&nbsp; ");
      const regra=d.regra==="tempo"?`${d.regra_valor} min`:`até ${d.regra_valor}`;
      return `<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0;border-top:1px solid #ffffff10">
        <div><div style="font-weight:700">${nomes}</div><div style="font-size:12px;color:var(--dim)">${regra} · ${(d.participantes||[]).length} competidores</div></div>
        <button class="btn btn-no" data-encerrar="${d.id}" style="border:1px solid #ff5b6e55;white-space:nowrap">encerrar duelo</button>
      </div>`;
    }).join("")}
  </div>`;
  box.querySelectorAll("[data-encerrar]").forEach(b=>b.onclick=async()=>{
    if(!confirm("Encerrar este duelo? Use em caso de desafio errado ou equipe que foi embora. Vence quem estiver na frente."))return;
    try{const r=await ArenaAPI.encerrarDuelo(b.dataset.encerrar,0);if(r&&r.ok){toast("Duelo encerrado");carregarDuelosAtivos();}}catch(e){toast("Erro ao encerrar",true);}});
}
function renderMesas(){
  const g=document.getElementById("mesasGrid");if(!g)return;
  // resumo: quantas equipes presentes (tablet) e quantas com reserva
  let nPres=0,nRes=0,pessoas=0;
  mesasMapa.forEach(m=>(m.equipes||[]).forEach(q=>{
    if(q.tipo==='presenca'){nPres++;pessoas+=(+q.presentes||0);}
    else {nRes++;pessoas+=(+q.presentes||0);}
  }));
  const resumo=document.getElementById("mapaResumo");
  if(resumo) resumo.innerHTML=`<b style="color:var(--ok)">${nPres}</b> presente${nPres!==1?'s':''} no salão (via tablet) · <b style="color:var(--cyan)">${nRes}</b> com reserva · <b>${pessoas}</b> pessoas`;
  g.innerHTML=mesasMapa.map(m=>{
    const pct=Math.min(100,Math.round((m.ocupados/m.lugares)*100));
    const eqs=(m.equipes||[]).map(q=>{
      const ocioso=q.ociosos>0;
      const presenca = q.tipo==='presenca';
      if(presenca){
        // equipe presente no salão (entrou pelo tablet) — sem reserva, mas movível e removível
        return `<div class="eq presenca" draggable="true" data-eqid="${q.equipe_id}" style="border-left:3px solid var(--ok)">
          <div class="eq-top"><span class="eq-nm">${q.gerencia||q.nome||'Equipe'}</span>
          <span class="ocioso-tag" style="background:#1fd18a22;color:var(--ok);border-color:#1fd18a55">presente</span></div>
          <div class="eq-meta">no salão agora · ${q.presentes} presente${q.presentes!==1?'s':''}${q.sem_mesa?' · ⚠ sem mesa':''}</div>
          <div class="eq-acts">
            <button class="btn-no" data-tirar="${q.equipe_id}" style="border:1px solid #ff5b6e55">tirar da sala</button>
          </div></div>`;
      }
      return `<div class="eq ${ocioso?'ocioso':''}" draggable="true" data-rid="${q.id}">
        <div class="eq-top"><span class="eq-nm">${q.gerencia||q.nome||'Equipe'}</span>
        <span>${ocioso?`<span class="ocioso-tag">${q.ociosos} ocioso${q.ociosos!==1?'s':''}</span>`:''}</span></div>
        <div class="eq-meta">reservou ${q.lugares} · presentes ${q.presentes} · ${(q.horario||'').slice(0,5)}</div>
        <div class="eq-acts">
          ${ocioso?`<button class="btn-gold" data-liberar="${q.id}">liberar ${q.ociosos}</button>`:''}
          <button class="btn-no" data-remres="${q.id}" style="border:1px solid #ff5b6e55">remover</button>
        </div></div>`;
    }).join("") || `<div class="empty">Mesa livre</div>`;
    return `<div class="mesa" data-mesa="${m.id}">
      <div class="mesa-head">
        <input class="mesa-nome" value="${m.nome}" data-renome="${m.id}"/>
        <span class="mesa-cap">${m.ocupados}/${m.lugares}<small> lug</small></span>
      </div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      ${eqs}</div>`;
  }).join("");
  bindMapa();
}
function bindMapa(){
  document.querySelectorAll("[data-renome]").forEach(inp=>{
    inp.onblur=async()=>{const id=inp.dataset.renome;const nome=inp.value.trim();if(!nome)return;
      try{await ArenaAPI.renomearMesa(id,nome);toast("Mesa renomeada");}catch(e){}};
    inp.onkeydown=e=>{if(e.key==="Enter")inp.blur();};
  });
  document.querySelectorAll("[data-liberar]").forEach(b=>b.onclick=async()=>{
    try{const r=await ArenaAPI.liberarReserva(b.dataset.liberar);if(r&&r.ok){toast(`${r.liberados} lugares liberados`);carregarMapa();}}catch(e){}});
  document.querySelectorAll("[data-remres]").forEach(b=>b.onclick=async()=>{
    if(!confirm("Remover esta reserva da mesa?"))return;
    try{await ArenaAPI.removerReserva(b.dataset.remres);toast("Reserva removida");carregarMapa();}catch(e){}});
  // tirar equipe presente da sala (foi embora / marcou presença por engano)
  document.querySelectorAll("[data-tirar]").forEach(b=>b.onclick=async()=>{
    if(!confirm("Tirar esta equipe da sala? Isso remove a presença de hoje."))return;
    try{const r=await ArenaAPI.tirarDaSala(b.dataset.tirar);if(r&&r.ok){toast("Equipe retirada da sala");carregarMapa();}}catch(e){toast("Erro ao retirar",true);}});
  // drag-and-drop: distingue reserva (rid) de presença sem reserva (eqid)
  let drag={tipo:null,id:null};
  document.querySelectorAll(".eq[draggable]").forEach(el=>{el.ondragstart=()=>{
    if(el.dataset.rid){drag={tipo:"reserva",id:el.dataset.rid};}
    else if(el.dataset.eqid){drag={tipo:"presenca",id:el.dataset.eqid};}
  };});
  document.querySelectorAll(".mesa").forEach(m=>{
    m.ondragover=e=>{e.preventDefault();m.classList.add("drop");};
    m.ondragleave=()=>m.classList.remove("drop");
    m.ondrop=async e=>{e.preventDefault();m.classList.remove("drop");
      const mesaId=m.dataset.mesa;if(!drag.id||!mesaId)return;
      try{
        let r;
        if(drag.tipo==="reserva") r=await ArenaAPI.reposicionarReserva(drag.id,mesaId);
        else r=await ArenaAPI.alocarPresenca(drag.id,mesaId,mapaDia);
        if(r&&r.ok){toast("Equipe movida");carregarMapa();}else{toast(r&&r.erro?r.erro:"Não coube nessa mesa",true);}
      }catch(e){toast("Erro ao mover",true);}
      drag={tipo:null,id:null};};
  });
}

// ===== EQUIPES =====
async function renderEquipes(){
  const p=document.getElementById("pane-equipes");
  p.innerHTML=`<h2>Equipes</h2><p class="lead">Importe por CSV ou cadastre manualmente. Tudo grava no banco.</p>
    <div class="card"><div class="row">
      <input type="file" id="csvFile" accept=".csv" style="display:none"/>
      <button class="btn btn-cyan" id="upBtn">Importar CSV</button>
      <button class="btn btn-ok" id="addBtn">+ Cadastrar equipe</button>
    </div></div>
    <div id="teamsList"></div>`;
  document.getElementById("upBtn").onclick=()=>document.getElementById("csvFile").click();
  document.getElementById("csvFile").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=async()=>{try{const res=await ArenaAPI.importarCSV(r.result);if(res&&res.ok){toast(`${res.equipes_importadas} equipes, ${res.corretores} corretores ✓`);carregarEquipes();return;}}catch(err){}toast("Falha ao importar",true);};r.readAsText(f);};
  document.getElementById("addBtn").onclick=async()=>{
    const ger=prompt("Gerência (ex: Ger. Nova)");if(!ger)return;
    const sup=prompt("Superintendência")||"—";const dir=prompt("Diretoria")||"—";
    const cor=(prompt("Corretores separados por vírgula")||"").split(",").map(s=>s.trim()).filter(Boolean);
    try{const res=await ArenaAPI.criarEquipe({diretoria:dir,superintendencia:sup,gerencia:ger,corretores:cor});if(res&&res.ok){toast("Equipe salva ✓");carregarEquipes();return;}}catch(e){}toast("Falha ao salvar",true);};
  carregarEquipes();
}
async function carregarEquipes(){
  if(!API_ON){document.getElementById("teamsList").innerHTML=`<p class="empty">Conecte ao banco.</p>`;return;}
  try{const res=await ArenaAPI.listarEquipes();equipes=(res&&res.ok)?(res.equipes||[]):[];}catch(e){equipes=[];}
  const l=document.getElementById("teamsList");if(!l)return;
  l.innerHTML=`<div class="card"><table><tr><th>Gerência</th><th>Superintendência</th><th>Corretores</th><th></th></tr>
    ${equipes.map(e=>`<tr><td>${e.gerencia}</td><td>${e.superintendencia}</td><td>${(e.corretores||[]).length}</td>
    <td style="text-align:right"><button class="btn btn-no" data-delteam="${e.id}" style="padding:7px 12px;font-size:12px">remover</button></td></tr>`).join("")}</table></div>`;
  l.querySelectorAll("[data-delteam]").forEach(b=>b.onclick=async()=>{if(!confirm("Remover equipe e seus dados?"))return;try{await ArenaAPI.removerEquipe(b.dataset.delteam);toast("Equipe removida");carregarEquipes();}catch(e){}});
}

// ===== USUÁRIOS =====
async function renderUsuarios(){
  const p=document.getElementById("pane-usuarios");
  p.innerHTML=`<h2>Acessos ao Agendamento</h2><p class="lead">Crie os logins dos superintendentes. Só quem tem acesso pode agendar pelo app.</p>
    <div class="card">
      <div class="field"><label>Nome do superintendente</label><input id="uNome" placeholder="ex: João Silva"/></div>
      <div class="row">
        <div class="field" style="flex:1;min-width:200px"><label>Diretoria</label><input id="uDir" placeholder="Diretoria"/></div>
        <div class="field" style="flex:1;min-width:200px"><label>Superintendência</label><input id="uSup" placeholder="Superintendência"/></div>
      </div>
      <div class="row">
        <div class="field" style="flex:1;min-width:160px"><label>Login</label><input id="uLogin" placeholder="login"/></div>
        <div class="field" style="flex:1;min-width:160px"><label>Senha</label><input id="uSenha" placeholder="senha (mín. 4)"/></div>
      </div>
      <button class="btn btn-ok" id="uCriar">+ Criar acesso</button>
    </div>
    <div id="usersList"></div>`;
  document.getElementById("uCriar").onclick=async()=>{
    const nome=document.getElementById("uNome").value.trim(), dir=document.getElementById("uDir").value.trim(),
      sup=document.getElementById("uSup").value.trim(), login=document.getElementById("uLogin").value.trim(), senha=document.getElementById("uSenha").value;
    if(!nome||!login||!senha){toast("Preencha nome, login e senha",true);return;}
    try{const r=await ArenaAPI.criarUsuario({nome,diretoria:dir,superintendencia:sup,login,senha});
      if(r&&r.ok){toast("Acesso criado ✓");carregarUsuarios();}else{toast(r&&r.erro?r.erro:"Falha",true);}}catch(e){toast("Falha ao criar",true);}};
  carregarUsuarios();
}
async function carregarUsuarios(){
  if(!API_ON){document.getElementById("usersList").innerHTML=`<p class="empty">Conecte ao banco.</p>`;return;}
  try{const r=await ArenaAPI.listarUsuarios();usuarios=(r&&r.ok)?(r.usuarios||[]):[];}catch(e){usuarios=[];}
  const l=document.getElementById("usersList");if(!l)return;
  l.innerHTML=`<div class="card"><table><tr><th>Nome</th><th>Login</th><th>Diretoria / Sup.</th><th></th></tr>
    ${usuarios.map(u=>`<tr><td>${u.nome}</td><td>${u.login}</td><td>${(u.diretoria||'—')} / ${(u.superintendencia||'—')}</td>
    <td style="text-align:right"><button class="btn btn-ghost" data-reset="${u.id}" style="padding:7px 10px;font-size:12px">nova senha</button>
    <button class="btn btn-no" data-deluser="${u.id}" style="padding:7px 10px;font-size:12px">remover</button></td></tr>`).join("")||'<tr><td colspan="4" class="empty">Nenhum acesso criado</td></tr>'}</table></div>`;
  l.querySelectorAll("[data-deluser]").forEach(b=>b.onclick=async()=>{if(!confirm("Remover este acesso?"))return;try{await ArenaAPI.removerUsuario(b.dataset.deluser);toast("Acesso removido");carregarUsuarios();}catch(e){}});
  l.querySelectorAll("[data-reset]").forEach(b=>b.onclick=async()=>{const s=prompt("Nova senha (mín. 4):");if(!s)return;try{await ArenaAPI.resetarUsuario(b.dataset.reset,s);toast("Senha alterada");}catch(e){}});
}

// ===== REGRAS & RODADA =====
async function renderRodada(){
  if(API_ON){try{const r=await ArenaAPI.lerConfig();if(r&&r.ok)cfg=r.config;}catch(e){}}
  const p=document.getElementById("pane-rodada");
  const stClass="st-"+(cfg.rodada_status||'parada');
  p.innerHTML=`<h2>Regras & Rodada</h2><p class="lead">Defina a pontuação e dê o start da sala.</p>
    <div class="card"><h2 style="font-size:16px">Pontuação</h2>
      <div class="row" style="margin-top:10px">
        <div class="field" style="flex:1;min-width:140px"><label>Visita (pts)</label><input type="number" id="cV" value="${cfg.pts_visita}" min="1"/></div>
        <div class="field" style="flex:1;min-width:140px"><label>Documentação (pts)</label><input type="number" id="cD" value="${cfg.pts_documentacao}" min="1"/></div>
      </div>
      <button class="btn btn-cyan" id="salvarPts">Salvar pontuação</button>
    </div>
    <div class="card"><h2 style="font-size:16px">Start da sala</h2>
      <p class="lead" style="margin:8px 0 14px">Status atual: <span class="statusbadge ${stClass}">${(cfg.rodada_status||'parada').toUpperCase()}</span></p>
      <div class="field"><label>Modo da rodada</label>
        <div class="row"><span class="pill ${cfg.rodada_modo!=='meta'?'sel':''}" data-modo="tempo">Por tempo</span><span class="pill ${cfg.rodada_modo==='meta'?'sel':''}" data-modo="meta">Por meta</span></div></div>
      <div class="field"><label id="valLbl">${cfg.rodada_modo==='meta'?'Meta (nº de visitas)':'Duração (minutos)'}</label>
        <div class="row" id="atalhos" style="margin-bottom:10px"></div>
        <input type="number" id="cVal" value="${cfg.rodada_min||0}" min="0" placeholder="digite o valor"/></div>
      <div class="row">
        <button class="btn btn-ok" id="btnStart">▶ Dar START</button>
        <button class="btn btn-ghost" id="btnPausar">Pausar</button>
        <button class="btn btn-no" id="btnEncerrar">Encerrar</button>
      </div>
    </div>
    <div class="card"><h2 style="font-size:16px">🔒 Código do dia (tablet)</h2>
      <p class="lead" style="margin:8px 0 12px">Sem código, o tablet fica aberto a qualquer um. Com código, só quem souber consegue <b>ativar equipe, marcar ponto e desafiar</b> — evita gente de fora brincando. Status: <span id="codStatus" class="statusbadge st-parada">—</span></p>
      <div class="field"><label>Novo código (ex.: CURY-1234)</label><input id="codNovo" placeholder="deixe vazio para DESLIGAR o bloqueio"/></div>
      <div class="field" id="codAtualWrap" style="display:none"><label>Código atual (necessário para trocar/desligar)</label><input id="codAtual" placeholder="o código em uso agora"/></div>
      <button class="btn btn-cyan" id="salvarCod">Salvar código</button>
    </div>`;
  let modo=cfg.rodada_modo==='meta'?'meta':'tempo';
  const renderAtalhos=()=>{
    const a=document.getElementById("atalhos");
    const opts=modo==='tempo'?[[60,'1h'],[120,'2h'],[180,'3h'],[0,'sem limite']]:[[5,'5'],[10,'10'],[15,'15'],[20,'20']];
    a.innerHTML=opts.map(o=>`<span class="pill" data-val="${o[0]}">${o[1]}</span>`).join("");
    a.querySelectorAll("[data-val]").forEach(b=>b.onclick=()=>{document.getElementById("cVal").value=b.dataset.val;});
    document.getElementById("valLbl").textContent=modo==='meta'?'Meta (nº de visitas)':'Duração (minutos)';
  };
  renderAtalhos();
  document.querySelectorAll("[data-modo]").forEach(b=>b.onclick=()=>{modo=b.dataset.modo;
    document.querySelectorAll("[data-modo]").forEach(x=>x.classList.toggle("sel",x.dataset.modo===modo));renderAtalhos();});
  document.getElementById("salvarPts").onclick=async()=>{
    const v=+document.getElementById("cV").value,d=+document.getElementById("cD").value;
    try{await ArenaAPI.salvarConfig({pts_visita:v,pts_documentacao:d,rodada_min:cfg.rodada_min||120});toast("Pontuação salva ✓");}catch(e){}};
  document.getElementById("btnStart").onclick=async()=>{
    const val=+document.getElementById("cVal").value;
    try{await ArenaAPI.startSala(modo,val);toast("Sala iniciada! 🚀");renderRodada();}catch(e){toast("Falha",true);}};
  document.getElementById("btnPausar").onclick=async()=>{try{await ArenaAPI.rodada('pausada');toast("Pausada");renderRodada();}catch(e){}};
  document.getElementById("btnEncerrar").onclick=async()=>{if(!confirm("Encerrar a rodada?"))return;try{await ArenaAPI.rodada('encerrada');toast("Encerrada");renderRodada();}catch(e){}};
  // ===== código do dia (tablet) =====
  (async()=>{
    let ativo=false;
    try{ const s=await ArenaAPI.statusAcesso(); ativo=!!(s&&s.ativo); }catch(e){}
    const badge=document.getElementById("codStatus");
    if(badge){ badge.textContent=ativo?"ATIVO":"DESLIGADO"; badge.className="statusbadge "+(ativo?"st-ativa":"st-parada"); }
    const wrap=document.getElementById("codAtualWrap"); if(wrap) wrap.style.display=ativo?"":"none";
  })();
  document.getElementById("salvarCod").onclick=async()=>{
    const novo=(document.getElementById("codNovo").value||"").trim();
    const ca=document.getElementById("codAtual");
    const atual=ca?(ca.value||"").trim():"";
    try{
      const r=await ArenaAPI.definirCodigo(novo,atual);
      if(r&&r.ok){ toast(novo?("Código do dia: "+novo+" ✓"):"Bloqueio desligado"); renderRodada(); }
      else toast((r&&r.erro)||"Falha ao salvar código",true);
    }catch(e){ toast("Falha ao salvar código",true); }
  };
}

// ===== RESERVAS =====
async function renderReservas(){
  const p=document.getElementById("pane-reservas");
  if(API_ON){try{const r=await ArenaAPI.listarReservas();reservas=(r&&r.ok)?(r.reservas||[]):[];}catch(e){reservas=[];}}
  p.innerHTML=`<h2>Reservas</h2><p class="lead">Os gerentes agendam pelo app; aqui você acompanha e ajusta no Mapa.</p>
    <div class="card"><table><tr><th>Dia</th><th>Hora</th><th>Equipe</th><th>Mesa</th><th>Lugares</th><th></th></tr>
    ${reservas.map(r=>`<tr><td>${(r.dia||'').split('-').reverse().join('/')}</td><td>${(r.horario||'').slice(0,5)}</td>
      <td>${r.gerencia||r.nome||'—'}</td><td>${r.mesa_nome||'—'}</td><td>${r.lugares||r.participantes||0}</td>
      <td style="text-align:right"><button class="btn btn-no" data-delr="${r.id}" style="padding:6px 11px;font-size:12px">remover</button></td></tr>`).join("")||'<tr><td colspan="6" class="empty">Nenhuma reserva</td></tr>'}</table></div>`;
  p.querySelectorAll("[data-delr]").forEach(b=>b.onclick=async()=>{if(!confirm("Remover reserva?"))return;try{await ArenaAPI.removerReserva(b.dataset.delr);toast("Removida");renderReservas();}catch(e){}});
}

async function bootstrap(){
  try{const r=await ArenaAPI.listarEquipes();if(r&&r.ok){API_ON=true;}}catch(e){}
  carregarMapa();
}
bootstrap();
</script>
</body>
</html>
