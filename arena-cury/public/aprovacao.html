<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arena Cury — Aprovação</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#00060f;--cury:#1a5fc4;--cyan:#00daff;--gold:#ffcf4d;--ink:#eaf4ff;--dim:#6f8bb0;
    --ok:#1fd18a;--no:#ff5b6e;--card:#0a1f44;
    --star:"Orbitron",sans-serif;--body:"Rajdhani",sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:radial-gradient(ellipse 90% 60% at 50% -10%,#0a3a8a44 0%,transparent 60%),var(--bg);color:var(--ink);font-family:var(--body);min-height:100vh}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;background-image:radial-gradient(1px 1px at 30px 40px,#fff,transparent),radial-gradient(1px 1px at 160px 90px,#9cf,transparent),radial-gradient(2px 2px at 300px 50px,#bdf,transparent);background-size:360px 240px}
  .wrap{position:relative;z-index:2;max-width:820px;margin:0 auto;padding:clamp(16px,3vw,32px) clamp(14px,3vw,28px) 80px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo .mk{font-family:var(--star);font-weight:900;font-size:clamp(18px,3vw,26px);color:#fff;background:linear-gradient(135deg,var(--cury),#003070);padding:3px 12px;border-radius:9px;box-shadow:0 0 18px #1a5fc455}
  .logo .ar{font-family:var(--star);font-weight:900;font-size:clamp(15px,2.4vw,22px);letter-spacing:.12em;color:var(--cyan)}
  .eyebrow{font-family:var(--star);font-size:10px;letter-spacing:.35em;color:var(--cyan);font-weight:600}
  h2{font-family:var(--star);font-weight:900;font-size:clamp(20px,3.4vw,30px);margin-bottom:4px}
  .lead{color:var(--dim);font-size:15px;margin-bottom:22px}
  .count{display:inline-block;background:var(--gold);color:#001030;font-family:var(--star);font-weight:700;font-size:14px;border-radius:99px;padding:3px 12px;margin-left:8px}

  .empty{text-align:center;color:var(--dim);padding:60px 20px;font-size:18px}

  .pcard{display:flex;gap:16px;align-items:center;background:var(--card);border:1px solid #1a5fc455;border-radius:18px;padding:16px;margin-bottom:14px;flex-wrap:wrap}
  .pcard .foto{width:96px;height:96px;border-radius:14px;object-fit:cover;cursor:zoom-in;flex-shrink:0;border:1px solid #1a5fc455}
  .pcard .info{flex:1;min-width:160px}
  .pcard .nm{font-family:var(--star);font-weight:900;font-size:20px}
  .pcard .ty{font-weight:700;font-size:14px;margin-top:3px}
  .pcard .ty.visita{color:var(--cyan)}.pcard .ty.doc{color:var(--gold)}
  .pcard .meta{color:var(--dim);font-size:12px;margin-top:4px}
  .pcard .acts{display:flex;gap:10px}
  .pcard .acts button{font-family:var(--star);font-weight:700;font-size:13px;border:none;border-radius:11px;padding:13px 18px;cursor:pointer}
  .ap{background:var(--ok);color:#012}.rj{background:transparent;border:1px solid var(--no)!important;color:var(--no)}
  .pcard .acts button:active{transform:scale(.95)}

  /* zoom foto */
  .zoom{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;background:rgba(0,2,8,.93);padding:20px;cursor:zoom-out}
  .zoom.on{display:flex}.zoom img{max-width:100%;max-height:100%;border-radius:12px}

  /* modal motivo rejeição */
  .modal{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:rgba(0,4,12,.85);padding:16px}
  .modal.on{display:flex}
  .sheet{background:#08152e;border:1px solid var(--no);border-radius:22px;padding:24px;width:100%;max-width:420px;animation:up .3s cubic-bezier(.2,1.3,.4,1) both}
  @keyframes up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  .sheet .lab{font-size:12px;letter-spacing:.2em;color:var(--no);margin-bottom:8px}
  .sheet .who{font-family:var(--star);font-weight:900;font-size:22px;margin-bottom:16px}
  .reasons{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .reason{text-align:left;font-family:var(--body);font-weight:600;font-size:15px;color:var(--ink);background:#0a1f44;border:1px solid #1a5fc455;border-radius:11px;padding:13px 15px;cursor:pointer;transition:all .15s}
  .reason.sel{background:var(--no);color:#fff;border-color:var(--no)}
  .sheet textarea{width:100%;background:#001030;border:1px solid #1a5fc455;border-radius:11px;padding:12px;color:var(--ink);font-family:var(--body);font-size:15px;resize:none;margin-bottom:16px}
  .acts2{display:flex;gap:10px}
  .acts2 button{flex:1;font-family:var(--star);font-weight:700;font-size:14px;border:none;border-radius:12px;padding:14px;cursor:pointer}
  .c2{background:transparent;border:1px solid #1a5fc455!important;color:var(--dim)}
  .r2{background:var(--no);color:#fff}.r2:disabled{background:#3a1820;color:#7a5a60;cursor:not-allowed}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;background:#08152e;border:1px solid var(--ok);border-radius:12px;padding:14px 22px;font-weight:700;color:var(--ok);opacity:0;transition:all .3s;pointer-events:none}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .toast.bad{border-color:var(--no);color:var(--no)}
</style>
</head>
<body>
<div class="stars"></div>
<div class="wrap">
  <div class="top">
    <div class="logo"><span class="mk">CURY</span><span class="ar">ARENA</span></div>
    <div class="eyebrow">PAINEL DE APROVAÇÃO</div>
  </div>
  <div class="eyebrow">VALIDAÇÃO ANTI-FRAUDE</div>
  <h2>Pendências para aprovar <span class="count" id="cnt">0</span></h2>
  <p class="lead">Confira o comprovante de cada agendamento. Só o que for aprovado conta na arena.</p>
  <div id="list"></div>
</div>

<div class="zoom" id="zoom"><img id="zoomImg" src=""/></div>
<div class="modal" id="modal"></div>
<div class="toast" id="toast"></div>

<script>
// pendências de exemplo (viriam do tablet/banco). foto = placeholder gerado.
function b64svg(s){return btoa(unescape(encodeURIComponent(s)));}
function ph(txt,c1,c2){return "data:image/svg+xml;base64,"+b64svg(`<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='${c1}'/><stop offset='1' stop-color='${c2}'/></linearGradient></defs><rect width='300' height='300' fill='url(#g)'/><text x='150' y='150' font-family='sans-serif' font-size='22' fill='#fff' text-anchor='middle' dominant-baseline='middle'>${txt}</text></svg>`);}
let pend=[
  {id:1,nome:"Lucas",ger:"Ger. Órion",tipo:"visita",ts:Date.now()-180000,foto:ph("Comprovante 1","#1a5fc4","#003070")},
  {id:2,nome:"Marina",ger:"Ger. Órion",tipo:"doc",ts:Date.now()-90000,foto:ph("Documentacao","#0a7d5a","#024")},
  {id:3,nome:"Rafa",ger:"Ger. Pulsar",tipo:"visita",ts:Date.now()-40000,foto:ph("Print WhatsApp","#7a3a8a","#024")},
];
const REASONS=["Comprovante ilegível","Foto não confere com o agendamento","Print antigo / fora de data","Documentação incompleta"];

function fmt(ts){const d=new Date(ts);return d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});}
function render(){
  document.getElementById("cnt").textContent=pend.length;
  const l=document.getElementById("list");
  if(pend.length===0){l.innerHTML=`<div class="empty">Nenhuma pendência. Tudo em dia ✅</div>`;return;}
  l.innerHTML=pend.map(p=>`
    <div class="pcard">
      <img class="foto" src="${p.foto}" data-id="${p.id}"/>
      <div class="info">
        <div class="nm">${p.nome}</div>
        <div class="ty ${p.tipo}">${p.tipo==="doc"?"🏆 Documentação (+3)":"🎯 Visita (+1)"}</div>
        <div class="meta">${p.ger} · enviado às ${fmt(p.ts)}</div>
      </div>
      <div class="acts">
        <button class="rj" data-rej="${p.id}">✕ Rejeitar</button>
        <button class="ap" data-ap="${p.id}">✓ Aprovar</button>
      </div>
    </div>`).join("");
  // bind
  document.querySelectorAll(".foto").forEach(img=>img.onclick=()=>{document.getElementById("zoomImg").src=img.src;document.getElementById("zoom").classList.add("on");});
  document.querySelectorAll("[data-ap]").forEach(b=>b.onclick=()=>approve(+b.dataset.ap));
  document.querySelectorAll("[data-rej]").forEach(b=>b.onclick=()=>openReject(+b.dataset.rej));
}
function approve(id){
  const p=pend.find(x=>x.id===id);pend=pend.filter(x=>x.id!==id);
  toast(`${p.nome}: ${p.tipo==="doc"?"documentação":"visita"} APROVADA — vai contar na arena! 🚀`);
  render();
}
let rejId=null,rejReason=null;
function openReject(id){
  rejId=id;rejReason=null;const p=pend.find(x=>x.id===id);
  const m=document.getElementById("modal");
  m.innerHTML=`<div class="sheet">
    <div class="lab">REJEITAR PENDÊNCIA</div>
    <div class="who">${p.nome} · ${p.tipo==="doc"?"Documentação":"Visita"}</div>
    <div class="reasons">${REASONS.map((r,i)=>`<button class="reason" data-r="${i}">${r}</button>`).join("")}</div>
    <textarea id="rejNote" rows="2" placeholder="Observação (opcional)…"></textarea>
    <div class="acts2">
      <button class="c2" id="rCancel">Cancelar</button>
      <button class="r2" id="rConfirm" disabled>Confirmar rejeição</button>
    </div>
  </div>`;
  m.classList.add("on");
  m.querySelectorAll(".reason").forEach(b=>b.onclick=()=>{rejReason=REASONS[+b.dataset.r];m.querySelectorAll(".reason").forEach(x=>x.classList.remove("sel"));b.classList.add("sel");document.getElementById("rConfirm").disabled=false;});
  document.getElementById("rCancel").onclick=()=>m.classList.remove("on");
  document.getElementById("rConfirm").onclick=confirmReject;
}
function confirmReject(){
  const p=pend.find(x=>x.id===rejId);const note=document.getElementById("rejNote").value.trim();
  pend=pend.filter(x=>x.id!==rejId);
  document.getElementById("modal").classList.remove("on");
  toast(`${p.nome}: rejeitada — ${rejReason}${note?" ("+note+")":""}`,true);
  render();
}
function toast(msg,bad){const t=document.getElementById("toast");t.textContent=msg;t.className="toast on"+(bad?" bad":"");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("on"),3000);}
document.getElementById("zoom").onclick=()=>document.getElementById("zoom").classList.remove("on");
render();
</script>
</body>
</html>
