<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Redefinir senha — Arena Cury</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#020814;color:#eaf4ff;font-family:Arial,Helvetica,sans-serif;padding:20px}
  .card{background:#08152e;border:1px solid #1a5fc466;border-radius:16px;padding:26px;max-width:380px;width:100%}
  h1{font-size:20px;margin:0 0 6px}
  p{color:#9fb6d6;font-size:14px;line-height:1.5}
  label{display:block;font-size:12px;color:#9fb6d6;margin:14px 0 6px}
  input{width:100%;box-sizing:border-box;background:#001030;border:1px solid #1a5fc455;border-radius:10px;padding:13px;color:#eaf4ff;font-size:16px}
  button{width:100%;margin-top:18px;background:linear-gradient(135deg,#00daff,#1a5fc4);color:#001030;font-weight:800;border:none;border-radius:12px;padding:15px;font-size:16px;cursor:pointer}
  .msg{margin-top:12px;font-size:14px}
  .ok{color:#1fd18a}.bad{color:#ff7a8a}
</style>
</head>
<body>
  <div class="card">
    <h1>🔒 Redefinir senha</h1>
    <p>Crie uma nova senha para sua conta da Arena Cury.</p>
    <div id="form">
      <label>Nova senha (mín. 4)</label>
      <input id="s1" type="password" autocomplete="new-password"/>
      <label>Repita a nova senha</label>
      <input id="s2" type="password" autocomplete="new-password"/>
      <button id="btn">Salvar nova senha</button>
      <p class="msg" id="msg"></p>
    </div>
  </div>
<script src="arena-api.js"></script>
<script>
  const token=new URLSearchParams(location.search).get("t")||"";
  const msg=document.getElementById("msg");
  if(!token){ msg.className="msg bad"; msg.textContent="Link inválido. Peça um novo na tela de login."; document.getElementById("btn").disabled=true; }
  async function salvar(){
    const a=document.getElementById("s1").value, b=document.getElementById("s2").value;
    if(a.length<4){ msg.className="msg bad"; msg.textContent="A senha precisa ter ao menos 4 caracteres."; return; }
    if(a!==b){ msg.className="msg bad"; msg.textContent="As senhas não conferem."; return; }
    try{
      const r=await ArenaAPI.redefinirSenha(token,a);
      if(r&&r.ok){ document.getElementById("form").innerHTML='<p class="msg ok">✅ Senha alterada! Já pode fazer login com a nova senha.</p>'; }
      else{ msg.className="msg bad"; msg.textContent=(r&&r.erro)||"Não foi possível redefinir."; }
    }catch(e){ msg.className="msg bad"; msg.textContent="Falha ao redefinir."; }
  }
  document.getElementById("btn").onclick=salvar;
  document.getElementById("s2").addEventListener("keydown",e=>{ if(e.key==="Enter") salvar(); });
</script>
</body>
</html>
